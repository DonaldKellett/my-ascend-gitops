---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: component-jupyterhub
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://hub.jupyter.org/helm-chart/
    chart: jupyterhub
    targetRevision: 4.4.0
    helm:
      valuesObject:
        ingress:
          enabled: true
          annotations:
            cluster-name: donaldsebleung-nucbox-k11
          hosts:
            - jupyterhub.internal.donaldsebleung.com
          tls:
            - hosts:
                - jupyterhub.internal.donaldsebleung.com
              secretName: jupyterhub-tls
        proxy:
          service:
            type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: jupyterhub
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
