---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '-1'
    argocd.argoproj.io/sync-options: 'Wait=true'
  name: component-system-upgrade-controller
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/rancher/system-upgrade-controller.git
    path: '.'
    targetRevision: 'v0.19.2'
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
