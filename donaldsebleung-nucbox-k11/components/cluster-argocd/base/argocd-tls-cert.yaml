---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls-cert
spec:
  secretName: argocd-tls
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: root-ca-clusterissuer
    kind: ClusterIssuer
  commonName: argocd.internal.donaldsebleung.com
  dnsNames:
    - argocd.internal.donaldsebleung.com
