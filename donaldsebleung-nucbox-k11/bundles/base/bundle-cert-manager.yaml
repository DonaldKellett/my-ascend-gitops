---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '1'
    argocd.argoproj.io/sync-options: 'Wait=true'
  name: bundle-cert-manager
spec:
  project: default
  source:
    repoURL: https://gitcode.com/donaldsebleung/my-ascend-gitops.git
    path: donaldsebleung-nucbox-k11/components/cert-manager/overlays/prod/
    targetRevision: HEAD
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
