---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-bootstrap
spec:
  project: default
  source:
    repoURL: https://gitcode.com/donaldsebleung/my-ascend-gitops.git
    path: bundles/overlays/prod/
    targetRevision: HEAD
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
